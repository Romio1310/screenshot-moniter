<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Intelligent Screenshot Monitoring System — Real-time dashboard for captured screenshots">
    <title>Screenshot Monitor — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══ Design Tokens ═══ */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --bg-card-hover: #222233;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(139, 92, 246, 0.3);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ═══ Reset & Base ═══ */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ═══ Header ═══ */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .logo h1 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--accent);
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .stat-dot.live { background: var(--success); }
        .stat-dot.count { background: var(--accent); }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .refresh-badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            background: var(--accent-glow);
            border: 1px solid var(--border-hover);
            border-radius: 20px;
            color: var(--accent);
            font-weight: 500;
        }

        /* ═══ Main Content ═══ */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ═══ Status Bar ═══ */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            transition: border-color var(--transition), transform var(--transition);
        }

        .status-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .status-card .label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .status-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .status-card .value.success { color: var(--success); }
        .status-card .value.accent { color: var(--accent); }

        /* ═══ Screenshot Grid ═══ */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .section-header h2 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .screenshot-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all var(--transition);
            cursor: pointer;
        }

        .screenshot-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: var(--shadow), 0 0 30px var(--accent-glow);
        }

        .screenshot-card .image-wrapper {
            aspect-ratio: 16/10;
            overflow: hidden;
            background: var(--bg-secondary);
            position: relative;
        }

        .screenshot-card .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .screenshot-card:hover .image-wrapper img {
            transform: scale(1.05);
        }

        .screenshot-card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
            opacity: 0;
            transition: opacity var(--transition);
            display: flex;
            align-items: flex-end;
            padding: 1rem;
        }

        .screenshot-card:hover .overlay {
            opacity: 1;
        }

        .overlay .view-btn {
            padding: 0.4rem 1rem;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
        }

        .screenshot-card .meta {
            padding: 0.9rem 1rem;
        }

        .screenshot-card .meta .filename {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
        }

        .screenshot-card .meta .timestamp {
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        .screenshot-card .meta .size {
            font-size: 0.68rem;
            color: var(--text-secondary);
            float: right;
            margin-top: -1.2rem;
        }

        /* ═══ Empty State ═══ */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.9rem;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ═══ Lightbox Modal ═══ */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .lightbox.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .lightbox .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
        }

        .lightbox .close-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ═══ Loading ═══ */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), #a855f7, var(--accent));
            background-size: 200% 100%;
            animation: shimmer 1.5s linear infinite;
            z-index: 200;
            display: none;
            width: 100%;
        }

        .loading-bar.active { display: block; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ═══ Responsive ═══ */
        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .main { padding: 1rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
            .header-stats { gap: 0.75rem; }
        }

        /* ═══ Toast ═══ */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.75rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.8rem;
            z-index: 1100;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.visible {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="loading-bar" class="loading-bar"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">📸</div>
                <h1>Screenshot <span>Monitor</span></h1>
            </div>
            <div class="header-stats">
                <div class="stat">
                    <div class="stat-dot live"></div>
                    <span id="status-text">Connecting...</span>
                </div>
                <div class="stat">
                    <div class="stat-dot count"></div>
                    <span id="count-text">0 screenshots</span>
                </div>
                <div class="refresh-badge" id="refresh-badge">
                    Auto-refresh: 30s
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Status Cards -->
        <div class="status-bar" id="status-bar">
            <div class="status-card">
                <div class="label">System Status</div>
                <div class="value success" id="sys-status">—</div>
            </div>
            <div class="status-card">
                <div class="label">Total Screenshots</div>
                <div class="value accent" id="sys-count">0</div>
            </div>
            <div class="status-card">
                <div class="label">Uptime</div>
                <div class="value" id="sys-uptime">—</div>
            </div>
            <div class="status-card">
                <div class="label">Last Refresh</div>
                <div class="value" id="sys-refresh">—</div>
            </div>
        </div>

        <!-- Screenshot Grid -->
        <div class="section-header">
            <h2>📷 Captured Screenshots</h2>
        </div>
        <div class="grid" id="screenshot-grid">
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>No screenshots captured yet. Install the Chrome Extension or upload manually via the API.</p>
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="close-btn" onclick="closeLightbox()">✕</button>
        <img id="lightbox-img" src="" alt="Screenshot preview">
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // ═══ Configuration ═══
        const REFRESH_INTERVAL = 30000; // 30 seconds
        const API_BASE = window.location.origin;

        let refreshTimer = null;
        let lastScreenshotCount = 0;

        // ═══ Data Fetching ═══
        async function fetchStatus() {
            try {
                const res = await fetch(`${API_BASE}/`);
                const data = await res.json();
                return data;
            } catch (err) {
                console.error('Status fetch failed:', err);
                return null;
            }
        }

        async function fetchScreenshots() {
            try {
                const res = await fetch(`${API_BASE}/screenshots`);
                const data = await res.json();
                return data;
            } catch (err) {
                console.error('Screenshots fetch failed:', err);
                return null;
            }
        }

        // ═══ UI Updates ═══
        function updateStatus(data) {
            if (!data) {
                document.getElementById('sys-status').textContent = 'Offline';
                document.getElementById('sys-status').className = 'value';
                document.getElementById('status-text').textContent = 'Offline';
                return;
            }

            document.getElementById('sys-status').textContent = data.status === 'running' ? 'Online' : data.status;
            document.getElementById('sys-status').className = `value ${data.status === 'running' ? 'success' : ''}`;
            document.getElementById('sys-count').textContent = data.screenshot_count || 0;
            document.getElementById('sys-uptime').textContent = formatUptime(data.uptime_seconds || 0);
            document.getElementById('sys-refresh').textContent = new Date().toLocaleTimeString();
            document.getElementById('status-text').textContent = data.status === 'running' ? 'Live' : 'Offline';
            document.getElementById('count-text').textContent = `${data.screenshot_count || 0} screenshots`;
        }

        function updateGrid(data) {
            const grid = document.getElementById('screenshot-grid');

            if (!data || !data.screenshots || data.screenshots.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">📭</div>
                        <p>No screenshots captured yet. Install the Chrome Extension or upload manually via the API.</p>
                    </div>`;
                return;
            }

            // Check for new screenshots
            if (data.screenshots.length > lastScreenshotCount && lastScreenshotCount > 0) {
                showToast(`📸 ${data.screenshots.length - lastScreenshotCount} new screenshot(s)`);
            }
            lastScreenshotCount = data.screenshots.length;

            grid.innerHTML = data.screenshots.map(s => `
                <div class="screenshot-card" onclick="openLightbox('${s.url}')">
                    <div class="image-wrapper">
                        <img src="${s.url}" alt="${s.filename}" loading="lazy"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 400 250&quot;><rect fill=&quot;%231a1a25&quot; width=&quot;400&quot; height=&quot;250&quot;/><text fill=&quot;%2355556a&quot; x=&quot;200&quot; y=&quot;130&quot; text-anchor=&quot;middle&quot; font-size=&quot;14&quot;>Preview unavailable</text></svg>'">
                        <div class="overlay">
                            <button class="view-btn">View Full Size</button>
                        </div>
                    </div>
                    <div class="meta">
                        <div class="filename">${s.filename}</div>
                        <div class="timestamp">${formatTimestamp(s.timestamp)}</div>
                        <div class="size">${formatSize(s.size)}</div>
                    </div>
                </div>
            `).join('');
        }

        // ═══ Helpers ═══
        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        function formatTimestamp(iso) {
            try {
                return new Date(iso).toLocaleString();
            } catch { return iso; }
        }

        function formatSize(bytes) {
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
        }

        // ═══ Lightbox ═══
        function openLightbox(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.getElementById('lightbox-img').src = '';
        }

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // ═══ Toast ═══
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        // ═══ Refresh Loop ═══
        async function refresh() {
            const loadingBar = document.getElementById('loading-bar');
            loadingBar.classList.add('active');

            try {
                const [statusData, screenshotData] = await Promise.all([
                    fetchStatus(),
                    fetchScreenshots()
                ]);

                updateStatus(statusData);
                updateGrid(screenshotData);
            } catch (err) {
                console.error('Refresh failed:', err);
            } finally {
                loadingBar.classList.remove('active');
            }
        }

        // ═══ Auto-Refresh with Countdown ═══
        let countdown = 30;

        function startAutoRefresh() {
            refresh(); // Initial load

            setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    countdown = 30;
                    refresh();
                }
                document.getElementById('refresh-badge').textContent = `Auto-refresh: ${countdown}s`;
            }, 1000);
        }

        // ═══ Initialize ═══
        startAutoRefresh();
    </script>
</body>
</html>
